<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Quiz | Flora Educativa</title>
  <link rel="stylesheet" href="style.css" />
  <link href="https://fonts.googleapis.com/css2?family=Quicksand:wght@400;600;700&display=swap" rel="stylesheet">
</head>
<body>
<header class="navbar">
    <div class="container">
      <div class="navbar-content">
        <a href="index.html" class="navbar-logo">
          <span class="leaf-icon">🌿</span>
          <span>Flora Educativa</span>
        </a>
        <nav class="navbar-nav">
          <a href="index.html" class="nav-link">Início</a>
          <a href="briofitas.html" class="nav-link">Briófitas</a>
          <a href="pteridofitas.html" class="nav-link">Pteridófitas</a>
          <a href="gimnospermas.html" class="nav-link">Gimnospermas</a>
          <a href="angiospermas.html" class="nav-link">Angiospermas</a>
          <a href="quiz.html" class="nav-link active">Quiz</a>
        </nav>
      </div>
    </div>
  </header>

  <section class="hero">
    <div class="container">
      <div class="hero-content">
        <h1>Quiz do Reino Vegetal</h1>
        <p>Teste seus conhecimentos sobre os principais grupos de plantas!</p>
      </div>
    </div>
  </section>

  <section class="info-section">
    <div class="container">
      <div id="quiz-container">
        <div class="quiz-question" id="question">Carregando pergunta...</div>
        <div class="quiz-options" id="options"></div>
        <button id="next-btn" class="button primary" style="display: none;">Próxima</button>
        <div id="result" class="quiz-result"></div>
      </div>
    </div>
  </section>

  <footer class="footer">
    <div class="container">
      <div class="footer-content">
        <div class="footer-logo">
          <span class="leaf-icon">🌿</span>
          <span>Flora Educativa</span>
        </div>
        <p>© 2025 - Um projeto educativo sobre botânica</p>
      </div>
    </div>
  </footer>

  <script>
    let questions = [];
    let currentQuestion = 0;
    let score = 0;

    const questionEl = document.getElementById("question");
    const optionsEl = document.getElementById("options");
    const nextBtn = document.getElementById("next-btn");
    const resultEl = document.getElementById("result");

    async function loadQuestions() {
      const response = await fetch("quiz-data.json");
      if (!response.ok) throw new Error("Falha ao carregar perguntas");
      questions = await response.json();
      showQuestion(currentQuestion);
    }

    function showQuestion(index) {
      const q = questions[index];
      questionEl.textContent = q.question;
      optionsEl.innerHTML = "";
      resultEl.textContent = "";

      q.options.forEach(option => {
        const btn = document.createElement("button");
        btn.classList.add("quiz-option");
        btn.type = "button";
        btn.textContent = option;
        btn.onclick = () => checkAnswer(option, q.answer);
        optionsEl.appendChild(btn);
      });
    }

    function checkAnswer(selected, correct) {
      const buttons = document.querySelectorAll(".quiz-option");
      buttons.forEach(btn => {
        btn.disabled = true;
        if (btn.textContent === correct) {
          btn.classList.add("correct");
          btn.setAttribute("aria-label", `${btn.textContent} - resposta correta`);
        }
        if (btn.textContent === selected && selected !== correct) {
          btn.classList.add("wrong");
          btn.setAttribute("aria-label", `${btn.textContent} - resposta incorreta`);
        }
      });

      if (selected === correct) {
        score++;
      }

      nextBtn.style.display = "inline-block";
    }

    nextBtn.onclick = () => {
      currentQuestion++;
      if (currentQuestion < questions.length) {
        showQuestion(currentQuestion);
        nextBtn.style.display = "none";
      } else {
        showResult();
      }
    };

    function showResult() {
      questionEl.textContent = "Você concluiu o quiz!";
      optionsEl.innerHTML = "";
      nextBtn.style.display = "none";
      resultEl.innerHTML = `<strong>Acertos:</strong> ${score} de ${questions.length}`;
    }

    loadQuestions().catch(() => {
      questionEl.textContent = "Não foi possível carregar o quiz.";
      optionsEl.innerHTML = "";
      nextBtn.style.display = "none";
    });
  </script>
</body>
</html>
